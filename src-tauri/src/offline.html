<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sup — Offline</title>
    <style>
      body { font-family: Segoe UI, sans-serif; margin: 0; background: #111b21; color: #d1d7db; }
      .wrap { max-width: 1000px; margin: 0 auto; padding: 18px; }
      .card { background: #202c33; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
      h1 { margin: 0 0 10px; font-size: 20px; }
      h2 { margin: 0 0 8px; font-size: 16px; }
      .meta { color: #8696a0; font-size: 13px; margin-bottom: 12px; }
      pre { white-space: pre-wrap; word-break: break-word; margin: 0; }
      .empty { color: #8696a0; }
      button { background: #00a884; color: #fff; border: 0; border-radius: 6px; padding: 8px 12px; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>You are offline</h1>
        <div class="meta">Showing the latest local snapshot from your previous online session.</div>
        <button id="retry">Retry online</button>
      </div>
      <div class="card">
        <h2>Chats (cached)</h2>
        <pre id="chats" class="empty">No cached chats yet.</pre>
      </div>
      <div class="card">
        <h2>Messages (cached)</h2>
        <pre id="messages" class="empty">No cached messages yet.</pre>
      </div>
    </div>

    <script>
      (function () {
        function setText(id, value) {
          var el = document.getElementById(id);
          el.textContent = value && value.trim() ? value : el.textContent;
          if (value && value.trim()) el.classList.remove("empty");
        }

        function render(snapshot) {
          setText("chats", (snapshot.chats || []).join("\n\n"));
          setText("messages", (snapshot.messages || []).join("\n\n"));
        }

        document.getElementById("retry").addEventListener("click", function () {
          location.href = "https://web.whatsapp.com";
        });

        if (window.__TAURI__?.core?.invoke) {
          window.__TAURI__.core
            .invoke("get_snapshot")
            .then(function (payload) {
              try {
                render(JSON.parse(payload));
              } catch (_) {}
            })
            .catch(function () {});
        }
      })();
    </script>
  </body>
</html>
